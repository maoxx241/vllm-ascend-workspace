version: 1
family_id: reset-cleanup
summary: Explicit destructive reset mutations split into request recording, remote cleanup, overlay cleanup, known_hosts cleanup, and remote restoration.
tools:
  - tool_id: reset.prepare_request
    path: tools/atomic/reset_prepare_request.py
    action_kind: execute
    idempotent: false
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
  - tool_id: reset.cleanup_remote_runtime
    path: tools/atomic/reset_cleanup_remote_runtime.py
    action_kind: cleanup
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
  - tool_id: reset.cleanup_overlay
    path: tools/atomic/reset_cleanup_overlay.py
    action_kind: cleanup
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
  - tool_id: reset.cleanup_known_hosts
    path: tools/atomic/reset_cleanup_known_hosts.py
    action_kind: cleanup
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
  - tool_id: reset.restore_public_remotes
    path: tools/atomic/reset_restore_public_remotes.py
    action_kind: repair
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
recipes:
  - recipe_id: reset-destructive-sequence
    summary: record an explicit request first, then clean remote runtime, overlay, known_hosts, and finally re-apply public remotes
    stop_conditions:
      - confirmation material has not been recorded
    escalation_points:
      - remote runtime cleanup is unreachable
      - public remotes cannot be restored
