version: 1
family_id: machine-runtime
summary: Probe-first machine and runtime readiness tools for managed-machine recovery.
tools:
  - tool_id: machine.probe_host_ssh
    path: tools/atomic/machine_probe_host_ssh.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
  - tool_id: machine.bootstrap_host_ssh
    path: tools/atomic/machine_bootstrap_host_ssh.py
    action_kind: bootstrap
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
  - tool_id: machine.sync_workspace_mirror
    path: tools/atomic/machine_sync_workspace_mirror.py
    action_kind: bootstrap
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
  - tool_id: runtime.probe_container_transport
    path: tools/atomic/runtime_probe_container_transport.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
  - tool_id: runtime.reconcile_container
    path: tools/atomic/runtime_reconcile_container.py
    action_kind: repair
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
  - tool_id: runtime.bootstrap_container_transport
    path: tools/atomic/runtime_bootstrap_container_transport.py
    action_kind: bootstrap
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
  - tool_id: runtime.cleanup_server
    path: tools/atomic/runtime_cleanup_server.py
    action_kind: cleanup
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
recipes:
  - recipe_id: machine-attach-fallback
    summary: probe host access, bootstrap host ssh if needed, sync workspace mirror, reconcile container, then bootstrap transport explicitly
    stop_conditions:
      - host ssh unreachable after bootstrap attempt
      - container contract drift requires destructive replacement and replacement fails
    escalation_points:
      - credentials are invalid
      - runtime bootstrap leaves only docker-exec available
