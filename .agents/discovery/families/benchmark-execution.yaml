version: 1
family_id: benchmark-execution
summary: Explicit benchmark preset inspection, benchmark run inspection, and benchmark execution tools built around an existing service session.
tools:
  - tool_id: benchmark.describe_preset
    path: tools/atomic/benchmark_describe_preset.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: benchmark.describe_run
    path: tools/atomic/benchmark_describe_run.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: benchmark.run_probe
    path: tools/atomic/benchmark_run_probe.py
    action_kind: execute
    idempotent: false
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
      - payload
recipes:
  - recipe_id: benchmark-explicit-service
    summary: inspect preset and explicit service identity first, then run the benchmark against that existing service session
    stop_conditions:
      - service_id is missing
      - service_id is unknown or no longer reusable
    escalation_points:
      - service fingerprint no longer matches current workspace state
      - no suitable service exists and serving lifecycle work is required first
