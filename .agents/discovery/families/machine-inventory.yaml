version: 1
family_id: machine-inventory
summary: Explicit server inventory mutations and inventory inspection tools that only touch servers.yaml.
tools:
  - tool_id: machine.register_server
    path: tools/atomic/machine_register_server.py
    action_kind: execute
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
  - tool_id: machine.describe_server
    path: tools/atomic/machine_describe_server.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - idempotent
      - payload
  - tool_id: machine.list_servers
    path: tools/atomic/machine_list_servers.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - idempotent
      - payload
  - tool_id: machine.remove_server
    path: tools/atomic/machine_remove_server.py
    action_kind: execute
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - retryable
      - idempotent
      - payload
recipes:
  - recipe_id: machine-inventory-mutate-then-verify
    summary: mutate only servers inventory here, then hand off to machine-runtime tools for host and runtime verification
    stop_conditions:
      - required inventory arguments are missing
    escalation_points:
      - inventory and live host reality disagree
