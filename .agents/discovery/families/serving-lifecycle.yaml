version: 1
family_id: serving-lifecycle
summary: Explicit serving lifecycle tools for launching, probing, inspecting, listing, and stopping workspace service sessions.
tools:
  - tool_id: serving.launch_service
    path: tools/atomic/serving_launch_service.py
    action_kind: execute
    idempotent: false
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: serving.probe_readiness
    path: tools/atomic/serving_probe_readiness.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: serving.describe_session
    path: tools/atomic/serving_describe_session.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: serving.list_sessions
    path: tools/atomic/serving_list_sessions.py
    action_kind: probe
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - next_probes
      - retryable
      - idempotent
      - payload
  - tool_id: serving.stop_service
    path: tools/atomic/serving_stop_service.py
    action_kind: cleanup
    idempotent: true
    outputs_required:
      - status
      - observations
    outputs_optional:
      - reason
      - side_effects
      - next_probes
      - retryable
      - idempotent
      - payload
recipes:
  - recipe_id: serving-launch-readiness
    summary: launch a service, probe readiness, then describe the ready session before reuse
    stop_conditions:
      - service launch fails
      - readiness probe times out or reports a broken session
    escalation_points:
      - transport is unavailable for the target machine
      - session exists but service cannot become ready
