hosts:
  host-a:
    host: 10.0.0.11
    port: 22
    login_user: root
    auth_group: shared-lab-a
    labels: [a3, 8npu]

targets:
  single-default:
    hosts: [host-a]
    runtime:
      # Baseline package example: quay.nju.edu.cn/ascend/vllm-ascend:latest
      image_ref: registry.example.com/ascend/vllm-ascend:<tag>
      container_name: vaws-<owner_id>
      ssh_port: 63269
      workspace_root: /vllm-workspace
      bootstrap_mode: host-then-container
