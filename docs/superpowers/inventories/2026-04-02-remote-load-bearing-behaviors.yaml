version: 1
source_file: tools/lib/remote.py
coverage_status: starter-triage
triage_method:
  - keep behaviors that cross auth, transport, lifecycle, or cache-authority boundaries
  - keep behaviors whose loss would change fallback order, mutate correctness, or hide escalation points
phase2_requirement: expand before deleting or replacing load-bearing remote behavior
entries:
  - behavior_id: host-ssh-access-bootstrap
    source_symbol: _ensure_host_ssh_access
    action_family: machine.host-access
    reason_load_bearing: verifies SSH key login first, then performs password bootstrap only when needed
    extraction_risk: losing key-first behavior would reintroduce unnecessary password prompts and unsafe fallback order
  - behavior_id: host-repo-streaming
    source_symbol: _stream_repo_to_host
    action_family: machine.code-sync
    reason_load_bearing: moves the local workspace to the host without depending on remote git credentials
    extraction_risk: replacing this with blind remote git commands would reintroduce auth drift and wrong-source fetches
  - behavior_id: container-contract-reconciliation
    source_symbol: _ensure_host_container
    action_family: runtime.container-lifecycle
    reason_load_bearing: inspects the existing container contract before deciding whether to reuse or replace the container
    extraction_risk: skipping this check would destroy working containers or preserve incompatible ones
  - behavior_id: container-runtime-bootstrap
    source_symbol: _bootstrap_container_runtime
    action_family: runtime.bootstrap
    reason_load_bearing: installs SSH and runtime prerequisites inside the container and writes the runtime root contract
    extraction_risk: losing this behavior would strand later runtime commands in partially initialized containers
  - behavior_id: transport-probe-order
    source_symbol: _probe_container_ssh_transport
    action_family: runtime.transport
    reason_load_bearing: checks container SSH as the preferred transport before falling back to docker exec
    extraction_risk: reversing or hiding this order would blur verification versus repair and recreate the current bug class
  - behavior_id: host-runtime-state-write
    source_symbol: _write_host_runtime_state
    action_family: runtime.observation-cache
    reason_load_bearing: records observed runtime transport on the host after runtime work has happened
    extraction_risk: later phases must not mistake this cache for authoritative readiness truth
